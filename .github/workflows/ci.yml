name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

env:
  LD_LIBRARY_PATH: /opt/termin/lib

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout termin-collision
        uses: actions/checkout@v4

      - name: Checkout termin-base
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/termin-base
          token: ${{ secrets.CLONETOKEN }}
          path: deps/termin-base

      - name: Checkout termin-mesh
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/termin-mesh
          token: ${{ secrets.CLONETOKEN }}
          path: deps/termin-mesh

      - name: Checkout termin-graphics
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/termin-graphics
          token: ${{ secrets.CLONETOKEN }}
          path: deps/termin-graphics

      - name: Checkout termin-inspect
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/termin-inspect
          token: ${{ secrets.CLONETOKEN }}
          path: deps/termin-inspect

      - name: Checkout termin-scene
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/termin-scene
          token: ${{ secrets.CLONETOKEN }}
          path: deps/termin-scene

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip setuptools wheel nanobind

      - name: Configure, build and install termin-base
        run: |
          cmake -S deps/termin-base -B deps/termin-base/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTERMIN_BASE_BUILD_TESTS=ON \
            -DTERMIN_BUILD_PYTHON=OFF \
            -DCMAKE_INSTALL_PREFIX=/opt/termin
          cmake --build deps/termin-base/build --parallel
          sudo cmake --install deps/termin-base/build
          ctest --test-dir deps/termin-base/build --output-on-failure

      - name: Configure, build and install termin-mesh
        run: |
          cmake -S deps/termin-mesh -B deps/termin-mesh/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/opt/termin \
            -DCMAKE_PREFIX_PATH=/opt/termin
          cmake --build deps/termin-mesh/build --parallel
          sudo cmake --install deps/termin-mesh/build

      - name: Configure, build and install termin-graphics
        run: |
          cmake -S deps/termin-graphics -B deps/termin-graphics/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=OFF \
            -DCMAKE_INSTALL_PREFIX=/opt/termin \
            -DCMAKE_PREFIX_PATH=/opt/termin
          cmake --build deps/termin-graphics/build --parallel
          sudo cmake --install deps/termin-graphics/build

      - name: Configure, build and install termin-inspect
        run: |
          cmake -S deps/termin-inspect -B deps/termin-inspect/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTI_BUILD_TESTS=ON \
            -DTERMIN_BUILD_PYTHON=OFF \
            -DCMAKE_INSTALL_PREFIX=/opt/termin \
            -DCMAKE_PREFIX_PATH=/opt/termin
          cmake --build deps/termin-inspect/build --parallel
          sudo cmake --install deps/termin-inspect/build
          ctest --test-dir deps/termin-inspect/build --output-on-failure

      - name: Configure, build and test termin-scene
        run: |
          cmake -S deps/termin-scene -B deps/termin-scene/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTERMIN_SCENE_BUILD_TESTS=ON \
            -DTERMIN_BUILD_PYTHON=OFF \
            -DCMAKE_INSTALL_PREFIX=/opt/termin \
            -DCMAKE_PREFIX_PATH=/opt/termin
          cmake --build deps/termin-scene/build --parallel
          ctest --test-dir deps/termin-scene/build --output-on-failure
          sudo cmake --install deps/termin-scene/build

      - name: Configure termin-collision
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTERMIN_COLLISION_BUILD_TESTS=ON \
            -DTERMIN_BUILD_PYTHON=OFF \
            -DCMAKE_PREFIX_PATH=/opt/termin

      - name: Build termin-collision
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
